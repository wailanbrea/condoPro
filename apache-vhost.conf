# ============================================
# CondoPro - Apache Virtual Host Configuration
# ============================================
# Add this to: C:\xampp\apache\conf\extra\httpd-vhosts.conf
#
# Also make sure to uncomment this line in httpd.conf:
#   Include conf/extra/httpd-vhosts.conf
#
# And add to C:\Windows\System32\drivers\etc\hosts:
#   127.0.0.1    condopro.test
#   (or your domain name)
# ============================================

<VirtualHost *:80>
    ServerName condopro.test
    DocumentRoot "C:/xampp/php/www/CondoPro/public"

    <Directory "C:/xampp/php/www/CondoPro/public">
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog "logs/condopro-error.log"
    CustomLog "logs/condopro-access.log" combined
</VirtualHost>

# ============================================
# For HTTPS (Production), add this:
# ============================================
# <VirtualHost *:443>
#     ServerName yourdomain.com
#     DocumentRoot "C:/xampp/php/www/CondoPro/public"
#
#     SSLEngine on
#     SSLCertificateFile "conf/ssl/yourdomain.com.crt"
#     SSLCertificateKeyFile "conf/ssl/yourdomain.com.key"
#
#     <Directory "C:/xampp/php/www/CondoPro/public">
#         AllowOverride All
#         Require all granted
#     </Directory>
#
#     ErrorLog "logs/condopro-error.log"
#     CustomLog "logs/condopro-access.log" combined
# </VirtualHost>

# Redirect HTTP to HTTPS
# <VirtualHost *:80>
#     ServerName yourdomain.com
#     Redirect permanent / https://yourdomain.com/
# </VirtualHost>